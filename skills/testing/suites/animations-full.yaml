    assert:
      response:
        - path: status
          equals: success

  - id: state.effect-brightness
    name: Apply brightness effect
    category: state
    tags: [state, effect, brightness]
    setup:
      - id: add-text
        kind: command
        type: editor.addText
        params:
          text: Bright
          from: 0
          durationMs: 3000
    execute:
      type: editor.addEffect
      params:
        itemId: "{{steps.add-text.result.itemId}}"
        effect_type: brightness
    assert:
      response:
        - path: status
          equals: success

  - id: state.effect-contrast
    name: Apply contrast effect
    category: state
    tags: [state, effect, contrast]
    setup:
      - id: add-text
        kind: command
        type: editor.addText
        params:
          text: Contrast
          from: 0
          durationMs: 3000
    execute:
      type: editor.addEffect
      params:
        itemId: "{{steps.add-text.result.itemId}}"
        effect_type: contrast
    assert:
      response:
        - path: status
          equals: success

  - id: state.effect-remove
    name: Remove effect from item
    category: state
    tags: [state, effect, remove]
    setup:
      - id: add-text
        kind: command
        type: editor.addText
        params:
          text: Remove Effect
          from: 0
          durationMs: 3000
      - id: add-eff
        kind: command
        type: editor.addEffect
        params:
          itemId: "{{steps.add-text.result.itemId}}"
          effect_type: blur
    execute:
      type: editor.removeEffect
      params:
        itemId: "{{steps.add-text.result.itemId}}"
        effect_type: blur
    assert:
      response:
        - path: status
          equals: success

  # ═══════════════════════════════════════════════════════════════════
  #  ANIMATION + EFFECT COMBINATION
  # ═══════════════════════════════════════════════════════════════════

  - id: workflow.anim-plus-effect
    name: "Retro style: fadeIn + sepia effect"
    category: workflow
    tags: [workflow, animation, effect, combo]
    setup:
      - id: add-text
        kind: command
        type: editor.addText
        params:
          text: "Retro Title"
          from: 0
          durationMs: 5000
      - id: set-anim
        kind: command
        type: editor.setAnimation
        params:
          itemId: "{{steps.add-text.result.itemId}}"
          animationIn: fadeIn
          duration: 800
    execute:
      type: editor.addEffect
      params:
        itemId: "{{steps.add-text.result.itemId}}"
        effect_type: sepia
    assert:
      response:
        - path: status
          equals: success
