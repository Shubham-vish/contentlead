    assert:
      response:
        - path: status
          equals: success

  - id: state.effect-sepia
    name: Apply sepia effect
    category: state
    tags: [state, effect, sepia]
    setup:
      - id: add-text
        kind: command
        type: editor.addText
        params:
          text: Sepia
          from: 0
          durationMs: 3000
    execute:
      type: editor.addEffect
      params:
        itemId: "{{steps.add-text.result.itemId}}"
